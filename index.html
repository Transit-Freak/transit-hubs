document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Capture phase also catches sub-resource load failures (map tiles,
    // images, fonts, CDN scripts), which surface as an element target with
    // no message. A map view fetches dozens of tiles; any that fail to load
    // would otherwise spam the overlay with uninformative "[bundle] error"
    // lines and cover the UI. Only report genuine uncaught script errors.
    if (e.target && e.target !== window && e.target.nodeName) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ltip-top:before {\r\n\tbottom: 0;\r\n\tmargin-bottom: -12px;\r\n\tborder-top-color: #fff;\r\n\t}\r\n.leaflet-tooltip-bottom:before {\r\n\ttop: 0;\r\n\tmargin-top: -12px;\r\n\tmargin-left: -6px;\r\n\tborder-bottom-color: #fff;\r\n\t}\r\n.leaflet-tooltip-left {\r\n\tmargin-left: -6px;\r\n}\r\n.leaflet-tooltip-right {\r\n\tmargin-left: 6px;\r\n}\r\n.leaflet-tooltip-left:before,\r\n.leaflet-tooltip-right:before {\r\n\ttop: 50%;\r\n\tmargin-top: -6px;\r\n\t}\r\n.leaflet-tooltip-left:before {\r\n\tright: 0;\r\n\tmargin-right: -12px;\r\n\tborder-left-color: #fff;\r\n\t}\r\n.leaflet-tooltip-right:before {\r\n\tleft: 0;\r\n\tmargin-left: -12px;\r\n\tborder-right-color: #fff;\r\n\t}\r\n\r\n/* Printing */\r\n\r\n@media print {\r\n\t/* Prevent printers from removing background-images of controls. */\r\n\t.leaflet-control {\r\n\t\t-webkit-print-color-adjust: exact;\r\n\t\tprint-color-adjust: exact;\r\n\t\t}\r\n\t}\r\n<\u002Fstyle>\n<script src=\"a05f925a-f8d5-4a48-a156-5c062b8729f0\"><\u002Fscript>\n<style>\n  body { margin:0; background:#d8d3c6; }\n  * { box-sizing:border-box; }\n  @keyframes gspin { to { transform:rotate(360deg); } }\n  .gtfs-hublabel { background:#bd7b2c; border:none; box-shadow:0 1px 5px rgba(20,35,59,0.25); color:#fff; font-family:'Assistant',sans-serif; font-weight:700; font-size:12.5px; padding:2px 9px; border-radius:5px; white-space:nowrap; }\n  .gtfs-hublabel::before { display:none !important; }\n  .gtfs-citylabel { background:#14233b; border:none; box-shadow:0 1px 6px rgba(20,35,59,0.3); color:#fff; font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:14px; padding:3px 12px; border-radius:6px; white-space:nowrap; }\n  .gtfs-citylabel::before { display:none !important; }\n  .leaflet-tooltip { font-family:'Assistant',sans-serif; font-size:13px; }\n  .leaflet-container { font-family:'Assistant',sans-serif; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"מאתר תחנות מעבר\" dir=\"rtl\" style=\"width:100%; max-width:1180px; margin:0 auto; min-height:100%; background:#efece4; color:#14233b; font-family:'Assistant',system-ui,sans-serif; overflow-x:hidden;\">\n\n  <!-- HEADER -->\n  <header style=\"background:#14233b; color:#f3f1ea; padding:clamp(28px,6vw,40px) clamp(18px,5vw,60px) clamp(26px,5vw,38px);\">\n    <div style=\"font-size:14px; font-weight:700; letter-spacing:2px; color:#7fa3d6; margin-bottom:14px;\">כלי תכנון · מודל חנה‑וסע בין‑עירוני<\u002Fdiv>\n    <h1 style=\"font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:clamp(27px,7vw,40px); line-height:1.1; margin:0 0 12px;\">מאתר תחנות מעבר אזוריות<\u002Fh1>\n    <p style=\"font-size:clamp(15px,4vw,18px); line-height:1.55; font-weight:300; max-width:820px; margin:0; color:#cdd6e4;\">טוענים קובץ GTFS — והכלי מחפש <strong style=\"font-weight:600; color:#f3f1ea;\">נקודות חדשות מחוץ לעיר<\u002Fstrong> שבהן כדאי לרכז את הקווים הבין‑עירוניים אל תל אביב, ירושלים ובאר שבע. במקום עשרות קווים ישירים בתדירות נמוכה — קו הזנה אל הנקודה, ומשם ציר תכוף אל העיר.<\u002Fp>\n  <\u002Fheader>\n\n  <!-- ===== IDLE / DROPZONE ===== -->\n  <sc-if value=\"{{ isIdle }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"padding:clamp(24px,6vw,48px) clamp(16px,5vw,60px) clamp(32px,6vw,60px);\">\n    <label for=\"gtfsFileInput\" ondrop=\"{{ onDrop }}\" ondragover=\"{{ onDragOver }}\" style=\"display:block; border:2.5px dashed #b9b2a0; border-radius:12px; background:#ffffff; padding:56px 40px; text-align:center; cursor:pointer;\">\n      <div style=\"width:74px; height:74px; border-radius:50%; background:#eef2f8; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;\">\n        <div style=\"width:30px; height:22px; border:3px solid #1c4f96; border-radius:5px; position:relative;\"><span style=\"position:absolute; inset:4px 5px auto 5px; height:3px; background:#1c4f96;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Frank Ruhl Libre',serif; font-size:27px; font-weight:700; margin:0 0 10px;\">בחירת קובץ GTFS (zip)<\u002Fh2>\n      <p style=\"font-size:16px; color:#8a93a3; margin:0 0 22px;\">הקישו כאן לבחירת הקובץ — או גררו אותו לכאן במחשב<\u002Fp>\n      <span style=\"display:inline-block; background:#1c4f96; color:#fff; font-size:17px; font-weight:600; padding:13px 32px; border-radius:7px;\">בחירת קובץ<\u002Fspan>\n      <p style=\"font-size:14.5px; color:#8a93a3; margin:26px auto 0; max-width:560px; line-height:1.6;\">הקובץ נשאר במכשיר שלך — שום דבר לא נשלח לשרת. הניתוח כולו מתבצע מקומית בדפדפן, גם בטלפון.<\u002Fp>\n      <input id=\"gtfsFileInput\" type=\"file\" onchange=\"{{ onFile }}\" style=\"position:absolute; width:1px; height:1px; opacity:0; overflow:hidden; clip:rect(0 0 0 0);\">\n    <\u002Flabel>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; margin-top:26px;\">\n      <div style=\"background:#ffffff; border-radius:8px; padding:22px 26px;\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:1px; color:#bd7b2c; margin-bottom:8px;\">מאיפה מורידים<\u002Fdiv>\n        <p style=\"font-size:15.5px; line-height:1.6; margin:0; color:#3c4658;\">הפיד הרשמי של משרד התחבורה, מתעדכן יומית (~120MB):<br><span style=\"font-family:monospace; font-size:13px; color:#14233b; word-break:break-all;\">gtfs.mot.gov.il/gtfsfiles/israel-public-transportation.zip<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border-radius:8px; padding:22px 26px;\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:1px; color:#bd7b2c; margin-bottom:8px;\">איך זה עובד<\u002Fdiv>\n        <p style=\"font-size:15.5px; line-height:1.6; margin:0; color:#3c4658;\">הכלי מסנן את אזור הדרום והמרכז (עד גוש דן), מאתר את הקווים הבין‑עירוניים אל כל עיר‑יעד, ומחפש את הנקודות שבהן הכי הרבה קווים ויישובי‑מקור מתנקזים — מועמדות לתחנת מעבר. עשוי לקחת דקה–שתיים.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PARSING ===== -->\n  <sc-if value=\"{{ isParsing }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:clamp(40px,8vw,70px) clamp(16px,5vw,60px) clamp(48px,8vw,80px);\">\n    <div style=\"background:#ffffff; border-radius:12px; padding:clamp(30px,6vw,54px) clamp(22px,5vw,48px); max-width:720px; margin:0 auto; text-align:center;\">\n      <div style=\"width:46px; height:46px; border:5px solid #e3e7ee; border-top-color:#1c4f96; border-radius:50%; margin:0 auto 28px; animation:gspin 0.9s linear infinite;\"><\u002Fdiv>\n      <h2 style=\"font-family:'Frank Ruhl Libre',serif; font-size:25px; font-weight:700; margin:0 0 22px; color:#14233b;\">{{ stage }}<\u002Fh2>\n      <div style=\"height:10px; background:#eef0f3; border-radius:6px; overflow:hidden; margin-bottom:16px;\">\n        <div style=\"height:100%; width:{{ progressPct }}%; background:#1c4f96; border-radius:6px; transition:width .25s ease;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:15px; color:#8a93a3; margin:0; min-height:20px;\">{{ rowsText }}<\u002Fp>\n      <p style=\"font-size:13.5px; color:#b3aa96; margin:30px 0 0;\">מעבד מקומית · אפשר להשאיר את הלשונית פתוחה<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== ERROR ===== -->\n  <sc-if value=\"{{ isError }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:clamp(40px,8vw,70px) clamp(16px,5vw,60px);\">\n    <div style=\"background:#fff4f0; border:1px solid #e7c3b4; border-radius:12px; padding:clamp(28px,6vw,44px) clamp(22px,5vw,40px); max-width:660px; margin:0 auto; text-align:center;\">\n      <h2 style=\"font-family:'Frank Ruhl Libre',serif; font-size:24px; font-weight:700; margin:0 0 12px; color:#9a3412;\">לא הצלחתי לעבד את הקובץ<\u002Fh2>\n      <p style=\"font-size:16px; color:#7c5a4a; margin:0 0 26px; line-height:1.6;\">{{ errorMsg }}<\u002Fp>\n      <button onclick=\"{{ onReset }}\" style=\"background:#1c4f96; color:#fff; font-size:16px; font-weight:600; padding:11px 28px; border:none; border-radius:7px; cursor:pointer; font-family:inherit;\">חזרה ובחירת קובץ אחר<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DASHBOARD ===== -->\n  <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:clamp(20px,5vw,34px) clamp(14px,4.5vw,60px) clamp(40px,7vw,64px);\">\n\n    <!-- toolbar -->\n    <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:26px; flex-wrap:wrap;\">\n      <div style=\"font-size:15px; color:#8a93a3;\">אזור: <strong style=\"color:#14233b;\">דרום ומרכז<\u002Fstrong> · מציג: <strong style=\"color:#14233b;\">{{ modeLabel }}<\u002Fstrong><\u002Fdiv>\n      <button onclick=\"{{ onReset }}\" style=\"background:#fff; color:#1c4f96; font-size:14.5px; font-weight:600; padding:9px 20px; border:1px solid #c9d4e4; border-radius:7px; cursor:pointer; font-family:inherit;\">טעינת קובץ אחר<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- stat cards -->\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(146px,1fr)); gap:14px; margin-bottom:30px;\">\n      <div style=\"background:#14233b; color:#f3f1ea; border-radius:10px; padding:24px 22px;\">\n        <div style=\"font-family:'Frank Ruhl Libre',serif; font-size:38px; font-weight:900; line-height:1;\">{{ nCities }}<\u002Fdiv>\n        <div style=\"font-size:15px; color:#9fb2cf; margin-top:8px;\">ערי יעד מנותחות<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border-radius:10px; padding:24px 22px;\">\n        <div style=\"font-family:'Frank Ruhl Libre',serif; font-size:38px; font-weight:900; line-height:1; color:#1c4f96;\">{{ nIntercity }}<\u002Fdiv>\n        <div style=\"font-size:15px; color:#8a93a3; margin-top:8px;\">קווים בין‑עירוניים אל הערים<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff; border-radius:10px; padding:24px 22px;\">\n        <div style=\"font-family:'Frank Ruhl Libre',serif; font-size:38px; font-weight:900; line-height:1; color:#1c4f96;\">{{ nCandidates }}<\u002Fdiv>\n        <div style=\"font-size:15px; color:#8a93a3; margin-top:8px;\">נקודות מעבר מוצעות<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#f4e8d6; border-radius:10px; padding:24px 22px;\">\n        <div style=\"font-family:'Frank Ruhl Libre',serif; font-size:38px; font-weight:900; line-height:1; color:#bd7b2c;\">{{ nOriginTowns }}<\u002Fdiv>\n        <div style=\"font-size:15px; color:#8a6a3a; margin-top:8px;\">יישובי מקור בפריפריה<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- city tabs -->\n    <div style=\"display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;\">\n      <sc-for list=\"{{ cityTabs }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- MAP -->\n    <div style=\"background:#ffffff; border-radius:10px; padding:clamp(16px,4vw,28px); margin-bottom:30px;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;\">\n        <h2 style=\"font-family:'Frank Ruhl Libre',serif; font-size:clamp(19px,5vw,24px); font-weight:700; margin:0; color:#14233b;\">נקודות מעבר מוצעות — כניסה ל{{ selectedCityName }}<\u002Fh2>\n        <div style=\"display:flex; gap:14px 18px; align-items:center; flex-wrap:wrap; font-size:13.5px; color:#5b6470;\">\n          <span style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:13px; height:13px; border-radius:50%; background:#14233b;\"><\u002Fspan>עיר היעד<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:13px; height:13px; border-radius:50%; background:#bd7b2c;\"><\u002Fspan>תחנת מעבר מוצעת<\u002Fspan>\n          <span style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:rgba(28,79,150,0.55);\"><\u002Fspan>תחנה בין‑עירונית<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div ref=\"{{ mapRef }}\" dir=\"ltr\" style=\"width:100%; height:clamp(340px,58vh,580px); border-radius:6px; overflow:hidden; background:#e8edf2;\"><\u002Fdiv>\n      <p style=\"font-size:13px; color:#b3aa96; margin:14px 0 0;\">הקו המקווקו מסמן את הציר התכוף המוצע מנקודת המעבר אל מרכז העיר. גודל הנקודה הכתומה לפי מספר הקווים ויישובי‑המקור שמתנקזים אליה.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- CANDIDATES -->\n    <div style=\"background:#ffffff; border-radius:10px; padding:clamp(18px,4.5vw,30px); margin-bottom:26px;\">\n      <h2 style=\"font-family:'Frank Ruhl Libre',serif; font-size:23px; font-weight:700; margin:0 0 6px; color:#14233b;\">המלצות לתחנות מעבר — {{ selectedCityName }}<\u002Fh2>\n      <p style=\"font-size:14.5px; color:#8a93a3; margin:0 0 22px; max-width:840px;\">מדורג לפי שילוב של מספר הקווים הבין‑עירוניים שמתנקזים לנקודה ומספר יישובי‑המקור השונים. ככל שיותר קווים ויישובים נפגשים בנקודה אחת — כך היא מתאימה יותר לשמש תחנת מעבר עם ציר תכוף אל העיר.<\u002Fp>\n\n      <sc-if value=\"{{ hasCandidates }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <sc-for list=\"{{ candidates }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; padding:16px 18px; background:#faf9f6; border-radius:8px; border:1px solid #efe9dc;\">\n            <div style=\"width:40px; height:40px; border-radius:50%; background:#bd7b2c; color:#fff; font-family:'Frank Ruhl Libre',serif; font-size:20px; font-weight:900; display:flex; align-items:center; justify-content:center; flex:none;\">{{ c.rank }}<\u002Fdiv>\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:10px;\">\n                <span style=\"font-size:18.5px; font-weight:700; color:#14233b;\">{{ c.name }}<\u002Fspan>\n                <span style=\"font-size:14px; color:#8a93a3;\">{{ c.distLabel }} מ{{ selectedCityName }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:26px; flex-wrap:wrap; margin-bottom:12px;\">\n                <div style=\"display:flex; align-items:baseline; gap:7px;\"><span style=\"font-size:22px; font-weight:800; color:#1c4f96; font-family:'Frank Ruhl Libre',serif;\">{{ c.routes }}<\u002Fspan><span style=\"font-size:14px; color:#5b6470;\">קווים בין‑עירוניים<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:baseline; gap:7px;\"><span style=\"font-size:22px; font-weight:800; color:#1c4f96; font-family:'Frank Ruhl Libre',serif;\">{{ c.nTowns }}<\u002Fspan><span style=\"font-size:14px; color:#5b6470;\">יישובי מקור<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n                <sc-for list=\"{{ c.townChips }}\" as=\"tw\" hint-placeholder-count=\"5\">\n                  <span style=\"font-size:13px; background:#eef2f8; color:#28456f; padding:5px 11px; border-radius:20px;\">{{ tw }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 120px; min-width:120px; align-self:center;\">\n              <div style=\"height:8px; background:#eef0f3; border-radius:5px; overflow:hidden;\"><div style=\"height:100%; width:{{ c.barPct }}%; background:#bd7b2c; border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:12px; color:#b3aa96; text-align:center; margin-top:6px;\">ציון {{ c.score }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ noCandidates }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:30px; text-align:center; color:#8a93a3; font-size:16px;\">לא נמצאו קווים בין‑עירוניים אל {{ selectedCityName }} בקובץ הזה. ייתכן שהעיר מחוץ לתחום הנתונים שנטענו, או שאין קווים שעומדים בסף המרחק.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <p style=\"font-size:12.5px; color:#b3aa96; line-height:1.7; margin:0;\">איך מחושב: לכל עיר‑יעד מאותרים הקווים הבין‑עירוניים (קו שמגיע עד קרבת העיר אך משתרע גם רחוק ממנה). נקודות המעבר נבחרות מתוך תחנות בטבעת מחוץ לעיר (ניתן לכוונון), על‑ידי איתור האזורים שבהם מתנקזים הכי הרבה קווים ויישובי‑מקור שונים, עם סינון של נקודות קרובות זו לזו. השמות והמיקומים מתבססים על תחנות קיימות בקרבת הנקודה המוצעת. כברירת מחדל מנותחים קווי אוטובוס בלבד (route_type=3). הניתוח מתעלם מנתוני המסלולים (shapes) לצורך חיסכון בזיכרון, ומבוסס על הקובץ שטענת בלבד.<\u002Fp>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 1500 },\n  &quot;busesOnly&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;approachMinKm&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 8, &quot;min&quot;: 2, &quot;max&quot;: 25, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;approachMaxKm&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 45, &quot;min&quot;: 15, &quot;max&quot;: 80, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;candidatesPerCity&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;min&quot;: 3, &quot;max&quot;: 12, &quot;tsType&quot;: &quot;number&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { phase: 'idle', stage: '', progressPct: 0, rowsText: '', errorMsg: '', selectedCity: 'ירושלים' };\n  mapRef = React.createRef();\n  _raw = null;\n  _map = null; _layer = null; _renderer = null; _fitted = false; _mapCity = null;\n  _analysisCache = null;\n\n  componentDidMount() { window.__gtfsComp = this; }\n  componentDidUpdate() { if (this.state.phase === 'done') this.renderMap(); }\n\n  // ---------- helpers ----------\n  _tick() { return new Promise(r => setTimeout(r, 16)); }\n  _concat(arrs) {\n    let n = 0; for (const a of arrs) n += a.length;\n    const out = new Uint8Array(n); let o = 0;\n    for (const a of arrs) { out.set(a, o); o += a.length; }\n    return out;\n  }\n  _csv(line) {\n    const out = []; let cur = '', q = false;\n    for (let i = 0; i < line.length; i++) {\n      const ch = line[i];\n      if (q) { if (ch === '\"') { if (line[i + 1] === '\"') { cur += '\"'; i++; } else q = false; } else cur += ch; }\n      else { if (ch === ',') { out.push(cur); cur = ''; } else if (ch === '\"') q = true; else cur += ch; }\n    }\n    out.push(cur); return out;\n  }\n  _toInt(text, a, b) { let v = 0; for (let k = a; k < b; k++) { const c = text.charCodeAt(k); if (c >= 48 && c <= 57) v = v * 10 + (c - 48); } return v; }\n  _bbox() { return { laMin: 29.3, laMax: 32.30, loMin: 34.0, loMax: 35.70 }; }\n  _distKm(la1, lo1, la2, lo2) {\n    const c = Math.cos((la1 + la2) / 2 * Math.PI / 180);\n    const dLa = (la1 - la2) * 111.0, dLo = (lo1 - lo2) * 111.0 * c;\n    return Math.sqrt(dLa * dLa + dLo * dLo);\n  }\n  _cities() { return [\n    { n: 'תל אביב', la: 32.0750, lo: 34.7900 },\n    { n: 'ירושלים', la: 31.7800, lo: 35.2100 },\n    { n: 'באר שבע', la: 31.2450, lo: 34.7950 },\n  ]; }\n  _towns() { return [\n    { n: 'באר שבע', la: 31.252, lo: 34.791 }, { n: 'דימונה', la: 31.066, lo: 35.033 },\n    { n: 'נתיבות', la: 31.422, lo: 34.589 }, { n: 'אופקים', la: 31.310, lo: 34.620 },\n    { n: 'שדרות', la: 31.524, lo: 34.596 }, { n: 'קריית גת', la: 31.610, lo: 34.770 },\n    { n: 'ערד', la: 31.259, lo: 35.213 }, { n: 'אילת', la: 29.557, lo: 34.952 },\n    { n: 'מצפה רמון', la: 30.610, lo: 34.801 }, { n: 'ירוחם', la: 30.987, lo: 34.929 },\n    { n: 'רהט', la: 31.393, lo: 34.754 }, { n: 'אשקלון', la: 31.668, lo: 34.574 },\n    { n: 'שדה בוקר', la: 30.872, lo: 34.795 }, { n: 'תל שבע', la: 31.260, lo: 34.844 },\n    { n: 'אשדוד', la: 31.802, lo: 34.656 }, { n: 'קריית מלאכי', la: 31.731, lo: 34.745 },\n    { n: 'גדרה', la: 31.814, lo: 34.779 }, { n: 'רחובות', la: 31.894, lo: 34.812 },\n    { n: 'נס ציונה', la: 31.929, lo: 34.799 }, { n: 'יבנה', la: 31.878, lo: 34.739 },\n    { n: 'ראשון לציון', la: 31.964, lo: 34.804 }, { n: 'מודיעין', la: 31.898, lo: 35.010 },\n    { n: 'בית שמש', la: 31.745, lo: 34.988 }, { n: 'קריית עקרון', la: 31.866, lo: 34.819 },\n    { n: 'גן יבנה', la: 31.788, lo: 34.706 }, { n: 'אופקים', la: 31.310, lo: 34.620 },\n    { n: 'מיתר', la: 31.319, lo: 34.933 }, { n: 'להבים', la: 31.371, lo: 34.814 },\n    { n: 'שובל', la: 31.397, lo: 34.748 }, { n: 'באר טוביה', la: 31.737, lo: 34.721 },\n    { n: 'קריית גת', la: 31.610, lo: 34.770 }, { n: 'יבנאל', la: 31.880, lo: 34.740 },\n    { n: 'ערד', la: 31.259, lo: 35.213 }, { n: 'בית גוברין', la: 31.609, lo: 34.897 },\n    { n: 'מסמיה', la: 31.738, lo: 34.808 }, { n: 'גני תקווה', la: 32.063, lo: 34.872 },\n  ]; }\n  _nearestTown(la, lo) {\n    const ts = this._towns(); let best = null, bd = Infinity; const cos = 0.853;\n    for (const t of ts) { const dla = la - t.la, dlo = (lo - t.lo) * cos; const d = dla * dla + dlo * dlo; if (d < bd) { bd = d; best = t.n; } }\n    return bd < 0.0049 ? best : 'אזור פתוח';\n  }\n  _short(s, n) { s = s || ''; return s.length > n ? s.slice(0, n - 1) + '…' : s; }\n\n  // ---------- entry ----------\n  onFile = (e) => { const f = e.target.files && e.target.files[0]; if (f) this._fromFile(f); };\n  onDrop = (e) => { e.preventDefault(); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if (f) this._fromFile(f); };\n  onDragOver = (e) => { e.preventDefault(); };\n  onReset = () => { this._destroyMap(); this._raw = null; this._analysisCache = null; this.setState({ phase: 'idle', stage: '', progressPct: 0, rowsText: '', errorMsg: '' }); };\n  _selectCity = (name) => { if (name !== this.state.selectedCity) { this._fitted = false; this.setState({ selectedCity: name }); } };\n  _fromFile(f) {\n    const nm = (f.name || '').toLowerCase();\n    if (/\\.(txt|csv|json|pdf|png|jpe?g)$/.test(nm)) {\n      this.setState({ phase: 'error', errorMsg: 'יש לבחור את קובץ ה‑ZIP המלא של ה‑GTFS — לא קובץ בודד מתוכו. הורידו את israel-public-transportation.zip והעלו אותו כמו שהוא, בלי לחלץ.' });\n      return;\n    }\n    this.setState({ phase: 'parsing', stage: 'קורא את הקובץ…', progressPct: 2, rowsText: '' });\n    Promise.resolve()\n      .then(() => f.arrayBuffer())\n      .then(b => this.handleBytes(new Uint8Array(b)))\n      .catch(err => {\n        const msg = (err && err.message) || String(err);\n        const friendly = /alloc|memory|range|maximum/i.test(msg)\n          ? 'הקובץ גדול מדי לעיבוד בדפדפן של המכשיר הזה (במיוחד בטלפון). נסו ממחשב, או טענו קובץ GTFS מסונן לאזור.'\n          : msg;\n        this.setState({ phase: 'error', errorMsg: friendly });\n      });\n  }\n\n  _pushSliced(uz, zip, onProg) {\n    const SL = 4 * 1024 * 1024; let off = 0;\n    return new Promise((resolve, reject) => {\n      const step = () => {\n        try {\n          const end = Math.min(off + SL, zip.length);\n          uz.push(zip.subarray(off, end), end >= zip.length);\n          off = end; if (onProg) onProg(end / zip.length);\n          if (end >= zip.length) resolve(); else setTimeout(step, 0);\n        } catch (e) { reject(e); }\n      };\n      step();\n    });\n  }\n\n  // ---------- pass A: small files ----------\n  _passSmall(zip) {\n    return new Promise((resolve, reject) => {\n      const uz = new fflate.Unzip(); uz.register(fflate.UnzipInflate);\n      const want = new Set(['stops.txt', 'routes.txt']); const parts = {};\n      uz.onfile = (file) => {\n        const b = file.name.split('/').pop();\n        if (want.has(b)) { parts[b] = []; file.ondata = (e, d) => { if (e) { reject(e); return; } parts[b].push(d); }; file.start(); }\n      };\n      this._pushSliced(uz, zip, null).then(() => {\n        try {\n          const dec = new TextDecoder('utf-8');\n          const stopsTxt = dec.decode(this._concat(parts['stops.txt'] || []));\n          const routesTxt = dec.decode(this._concat(parts['routes.txt'] || []));\n          resolve(this._parseSmall(stopsTxt, routesTxt));\n        } catch (err) { reject(err); }\n      }).catch(reject);\n    });\n  }\n  _parseSmall(stopsTxt, routesTxt) {\n    const B = this._bbox();\n    const sl = stopsTxt.split(/\\r?\\n/); const sh = this._csv(sl[0]);\n    const iId = sh.indexOf('stop_id'), iN = sh.indexOf('stop_name'), iLa = sh.indexOf('stop_lat'), iLo = sh.indexOf('stop_lon');\n    if (iId < 0 || iLa < 0 || iLo < 0) throw new Error('הקובץ אינו GTFS תקין (חסר stops.txt תקין)');\n    const keepSet = new Set(); const stopMeta = new Map();\n    for (let k = 1; k < sl.length; k++) {\n      const ln = sl[k]; if (!ln) continue; const c = this._csv(ln);\n      const la = parseFloat(c[iLa]), lo = parseFloat(c[iLo]);\n      if (!isFinite(la) || !isFinite(lo)) continue;\n      if (la >= B.laMin && la <= B.laMax && lo >= B.loMin && lo <= B.loMax) {\n        const id = parseInt(c[iId], 10); if (!isFinite(id)) continue;\n        keepSet.add(id); stopMeta.set(id, { name: c[iN], lat: la, lon: lo, town: this._nearestTown(la, lo) });\n      }\n    }\n    const rl = routesTxt.split(/\\r?\\n/); const rh = this._csv(rl[0]);\n    const jR = rh.indexOf('route_id'), jS = rh.indexOf('route_short_name'), jL = rh.indexOf('route_long_name'), jA = rh.indexOf('agency_id'), jT = rh.indexOf('route_type');\n    const routeMeta = new Map();\n    for (let k = 1; k < rl.length; k++) {\n      const ln = rl[k]; if (!ln) continue; const c = this._csv(ln);\n      routeMeta.set(c[jR], { short: (c[jS] || '').trim(), long: (c[jL] || '').trim(), agency: jA >= 0 ? c[jA] : '', type: jT >= 0 ? c[jT] : '' });\n    }\n    return { keepSet, stopMeta, routeMeta };\n  }\n\n  // ---------- pass B: stop_times (streamed) ----------\n  _passStopTimes(zip, keepSet) {\n    return new Promise((resolve, reject) => {\n      const uz = new fflate.Unzip(); uz.register(fflate.UnzipInflate);\n      const dec = new TextDecoder('utf-8');\n      const stopTrips = new Map(); const keepTrips = new Set();\n      let header = false, idxTrip = -1, idxStop = -1, leftover = '', rows = 0, lastRep = 0;\n      const self = this;\n      uz.onfile = (file) => {\n        if (file.name.split('/').pop() !== 'stop_times.txt') return;\n        file.ondata = (e, data, final) => {\n          if (e) { reject(e); return; }\n          let text = leftover + dec.decode(data, { stream: !final });\n          let cut; if (final) { cut = text.length; leftover = ''; } else { cut = text.lastIndexOf('\\n') + 1; leftover = text.slice(cut); }\n          let i = 0;\n          if (!header) {\n            const nl = text.indexOf('\\n'); const cols = text.slice(0, nl).split(',');\n            idxTrip = cols.indexOf('trip_id'); idxStop = cols.indexOf('stop_id');\n            if (idxTrip < 0 || idxStop < 0) { reject(new Error('מבנה stop_times.txt לא צפוי')); return; }\n            header = true; i = nl + 1;\n          }\n          const maxIdx = Math.max(idxTrip, idxStop);\n          while (i < cut) {\n            let nl = text.indexOf('\\n', i); if (nl < 0 || nl > cut) nl = cut;\n            let col = 0, fStart = i, tStart = -1, tEnd = -1, sidVal = 0, sidHas = false;\n            for (let j = i; j < nl; j++) {\n              if (text.charCodeAt(j) === 44) {\n                if (col === idxTrip) { tStart = fStart; tEnd = j; }\n                else if (col === idxStop) { sidVal = self._toInt(text, fStart, j); sidHas = true; }\n                col++; fStart = j + 1;\n                if (col > maxIdx && tStart >= 0 && sidHas) break;\n              }\n            }\n            if (col === idxTrip && tStart < 0) { tStart = fStart; tEnd = nl; }\n            if (col === idxStop && !sidHas) { sidVal = self._toInt(text, fStart, nl); sidHas = true; }\n            if (sidHas && keepSet.has(sidVal) && tStart >= 0) {\n              const tid = text.slice(tStart, tEnd);\n              let s = stopTrips.get(sidVal); if (!s) { s = new Set(); stopTrips.set(sidVal, s); }\n              s.add(tid); keepTrips.add(tid);\n            }\n            rows++; i = nl + 1;\n          }\n          if (rows - lastRep > 400000) { lastRep = rows; self.setState({ rowsText: 'עובד לוחות זמנים — ' + (rows / 1e6).toFixed(1) + ' מ׳ שורות' }); }\n          if (final) resolve({ stopTrips, keepTrips });\n        };\n        file.start();\n      };\n      this._pushSliced(uz, zip, (f) => this.setState({ progressPct: Math.round(12 + f * 52) })).catch(reject);\n    });\n  }\n\n  // ---------- pass C: trips (streamed) ----------\n  _passTrips(zip, keepTrips) {\n    return new Promise((resolve, reject) => {\n      const uz = new fflate.Unzip(); uz.register(fflate.UnzipInflate);\n      const dec = new TextDecoder('utf-8');\n      const tripRoute = new Map(); const svc = new Map();\n      let header = false, iR = -1, iS = -1, iT = -1, leftover = '', rows = 0, lastRep = 0;\n      const self = this;\n      uz.onfile = (file) => {\n        if (file.name.split('/').pop() !== 'trips.txt') return;\n        file.ondata = (e, data, final) => {\n          if (e) { reject(e); return; }\n          let text = leftover + dec.decode(data, { stream: !final });\n          let cut; if (final) { cut = text.length; leftover = ''; } else { cut = text.lastIndexOf('\\n') + 1; leftover = text.slice(cut); }\n          let i = 0;\n          if (!header) {\n            const nl = text.indexOf('\\n'); const cols = text.slice(0, nl).split(',');\n            iR = cols.indexOf('route_id'); iS = cols.indexOf('service_id'); iT = cols.indexOf('trip_id');\n            if (iR < 0 || iS < 0 || iT < 0) { reject(new Error('מבנה trips.txt לא צפוי')); return; }\n            header = true; i = nl + 1;\n          }\n          const maxIdx = Math.max(iR, iS, iT);\n          while (i < cut) {\n            let nl = text.indexOf('\\n', i); if (nl < 0 || nl > cut) nl = cut;\n            let col = 0, fStart = i; let rS = -1, rE = -1, sS = -1, sE = -1, tS = -1, tE = -1;\n            for (let j = i; j < nl; j++) {\n              if (text.charCodeAt(j) === 44) {\n                if (col === iR) { rS = fStart; rE = j; } else if (col === iS) { sS = fStart; sE = j; } else if (col === iT) { tS = fStart; tE = j; }\n                col++; fStart = j + 1; if (col > maxIdx) break;\n              }\n            }\n            if (col === iR && rS < 0) { rS = fStart; rE = nl; }\n            if (col === iS && sS < 0) { sS = fStart; sE = nl; }\n            if (col === iT && tS < 0) { tS = fStart; tE = nl; }\n            if (tS >= 0) {\n              const tid = text.slice(tS, tE);\n              if (keepTrips.has(tid)) {\n                const rid = text.slice(rS, rE); const sid = text.slice(sS, sE);\n                tripRoute.set(tid, rid);\n                let m = svc.get(rid); if (!m) { m = new Map(); svc.set(rid, m); }\n                m.set(sid, (m.get(sid) || 0) + 1);\n              }\n            }\n            rows++; i = nl + 1;\n          }\n          if (rows - lastRep > 300000) { lastRep = rows; self.setState({ rowsText: 'עובד קווים ונסיעות…' }); }\n          if (final) {\n            const routeDaily = new Map();\n            svc.forEach((m, rid) => { let mx = 0; m.forEach(v => { if (v > mx) mx = v; }); routeDaily.set(rid, mx); });\n            resolve({ tripRoute, routeDaily });\n          }\n        };\n        file.start();\n      };\n      this._pushSliced(uz, zip, (f) => this.setState({ progressPct: Math.round(70 + f * 22) })).catch(reject);\n    });\n  }\n\n  // ---------- orchestration ----------\n  async handleBytes(zip) {\n    try {\n      if (!window.fflate) throw new Error('ספריית פענוח ה‑ZIP לא נטענה. רענן ונסה שוב.');\n      this.setState({ phase: 'parsing', stage: 'קורא תחנות וקווים…', progressPct: 8, rowsText: '' }); await this._tick();\n      const { keepSet, stopMeta, routeMeta } = await this._passSmall(zip);\n      if (keepSet.size === 0) throw new Error('לא נמצאו תחנות באזור הדרום והמרכז בקובץ הזה.');\n      this.setState({ stage: 'מנתח לוחות זמנים (stop_times)…', progressPct: 14, rowsText: '' }); await this._tick();\n      const { stopTrips, keepTrips } = await this._passStopTimes(zip, keepSet);\n      this.setState({ stage: 'מנתח קווים ונסיעות (trips)…', progressPct: 70, rowsText: '' }); await this._tick();\n      const { tripRoute, routeDaily } = await this._passTrips(zip, keepTrips);\n      this.setState({ stage: 'מאתר תחנות מעבר…', progressPct: 94, rowsText: '' }); await this._tick();\n      this._raw = this._combine(stopMeta, routeMeta, stopTrips, tripRoute, routeDaily);\n      this._analysisCache = null;\n      this.setState({ phase: 'done', progressPct: 100 });\n    } catch (e) { this.setState({ phase: 'error', errorMsg: (e && e.message) || String(e) }); }\n  }\n  _combine(stopMeta, routeMeta, stopTrips, tripRoute, routeDaily) {\n    const stops = [];\n    stopTrips.forEach((tripSet, sid) => {\n      const meta = stopMeta.get(sid); if (!meta) return;\n      const rset = new Set();\n      tripSet.forEach(tid => { const r = tripRoute.get(tid); if (r) rset.add(r); });\n      if (rset.size === 0) return;\n      stops.push({ id: sid, name: meta.name, lat: meta.lat, lon: meta.lon, town: meta.town, routes: Array.from(rset) });\n    });\n    return { stops, routeMeta, routeDaily };\n  }\n\n  // ---------- mode filter ----------\n  _allowed() {\n    if ((this.props.busesOnly ?? true) === false) return null;\n    const rm = this._raw.routeMeta;\n    return (rid) => { const m = rm.get(rid); return !!m && m.type === '3'; };\n  }\n  _view() {\n    const r = this._raw; const allow = this._allowed(); const out = [];\n    for (let i = 0; i < r.stops.length; i++) {\n      const s = r.stops[i];\n      const fr = allow ? s.routes.filter(allow) : s.routes;\n      if (!fr.length) continue;\n      out.push({ id: s.id, name: s.name, lat: s.lat, lon: s.lon, town: s.town, routes: fr });\n    }\n    return out;\n  }\n\n  // ---------- interchange analysis ----------\n  _analyze() {\n    const bandMin = this.props.approachMinKm ?? 8, bandMax = this.props.approachMaxKm ?? 45;\n    const topN = this.props.candidatesPerCity ?? 6;\n    const sig = [(this.props.busesOnly ?? true), bandMin, bandMax, topN].join('|');\n    if (this._analysisCache && this._analysisCache.sig === sig) return this._analysisCache.data;\n    const R_city = 7, R_inter = 20, cell = 0.022, nmsKm = 6;\n    const stops = this._view();\n    const routeStops = new Map();\n    for (const s of stops) { for (const rid of s.routes) { let a = routeStops.get(rid); if (!a) { a = []; routeStops.set(rid, a); } a.push(s); } }\n    const cities = this._cities();\n    const globalRoutes = new Set(); const globalTowns = new Set();\n    const perCity = cities.map(C => {\n      const intercity = [];\n      routeStops.forEach((arr, rid) => {\n        let minD = Infinity, maxD = 0;\n        for (const s of arr) { const d = this._distKm(s.lat, s.lon, C.la, C.lo); if (d < minD) minD = d; if (d > maxD) maxD = d; }\n        if (minD <= R_city && maxD >= R_inter) intercity.push({ rid, arr });\n      });\n      const cells = new Map();\n      for (const route of intercity) {\n        const towns = new Set();\n        for (const s of route.arr) { const d = this._distKm(s.lat, s.lon, C.la, C.lo); if (d >= R_inter && s.town && s.town !== 'אזור פתוח') towns.add(s.town); }\n        const seen = new Set();\n        for (const s of route.arr) {\n          const d = this._distKm(s.lat, s.lon, C.la, C.lo);\n          if (d < bandMin || d > bandMax) continue;\n          const key = Math.round(s.lat / cell) + '_' + Math.round(s.lon / cell);\n          let cobj = cells.get(key);\n          if (!cobj) { cobj = { routes: new Set(), towns: new Set(), latSum: 0, lonSum: 0, n: 0, best: null, bestR: -1 }; cells.set(key, cobj); }\n          if (!seen.has(key)) { seen.add(key); cobj.routes.add(route.rid); towns.forEach(t => cobj.towns.add(t)); }\n          cobj.latSum += s.lat; cobj.lonSum += s.lon; cobj.n++;\n          if (s.routes.length > cobj.bestR) { cobj.bestR = s.routes.length; cobj.best = s; }\n        }\n      }\n      let arr2 = [];\n      cells.forEach(c => { arr2.push({ score: c.routes.size + c.towns.size, routes: c.routes.size, towns: Array.from(c.towns), lat: c.latSum / c.n, lon: c.lonSum / c.n, rep: c.best }); });\n      arr2.sort((a, b) => b.score - a.score || b.routes - a.routes);\n      const picked = [];\n      for (const cand of arr2) {\n        let ok = true;\n        for (const p of picked) { if (this._distKm(cand.lat, cand.lon, p.lat, p.lon) < nmsKm) { ok = false; break; } }\n        if (ok) { picked.push(cand); if (picked.length >= topN) break; }\n      }\n      const maxScore = picked.length ? picked[0].score : 1;\n      const ranked = picked.map((c, i) => ({\n        rank: i + 1, name: (c.rep && c.rep.name) ? c.rep.name : 'נקודה ללא שם',\n        lat: c.lat, lon: c.lon, routes: c.routes, score: c.score,\n        nTowns: c.towns.length, towns: c.towns.slice().sort(),\n        townChips: c.towns.slice().sort().slice(0, 6),\n        barPct: Math.round(c.score / maxScore * 100),\n        distKm: Math.round(this._distKm(c.lat, c.lon, C.la, C.lo)),\n        distLabel: 'כ‑' + Math.round(this._distKm(c.lat, c.lon, C.la, C.lo)) + ' ק״מ',\n      }));\n      const feederMap = new Map();\n      for (const route of intercity) { for (const s of route.arr) { const d = this._distKm(s.lat, s.lon, C.la, C.lo); if (d >= bandMin && d <= bandMax) feederMap.set(s.id, s); route.rid && globalRoutes.add(C.n + '|' + route.rid); } }\n      ranked.forEach(c => c.towns.forEach(t => globalTowns.add(t)));\n      return { city: C, nIntercity: intercity.length, candidates: ranked, feeders: Array.from(feederMap.values()) };\n    });\n    const data = { perCity, nIntercityTotal: globalRoutes.size, nOriginTowns: globalTowns.size };\n    this._analysisCache = { sig, data };\n    return data;\n  }\n  _selectedCityData(data) {\n    const want = this.state.selectedCity;\n    let pc = data.perCity.find(p => p.city.n === want && p.nIntercity > 0);\n    if (!pc) pc = data.perCity.find(p => p.nIntercity > 0) || data.perCity[0];\n    return pc;\n  }\n\n  // ---------- map ----------\n  _destroyMap() { if (this._map) { try { this._map.remove(); } catch (e) {} } this._map = null; this._layer = null; this._renderer = null; this._fitted = false; this._mapCity = null; }\n\n  renderMap() {\n    if (!this._raw) return;\n    const el = this.mapRef.current; if (!el || !window.L) return;\n    const data = this._analyze();\n    const pc = this._selectedCityData(data); if (!pc) return;\n    if (!this._map) {\n      this._map = L.map(el, { preferCanvas: true, zoomControl: true, scrollWheelZoom: true });\n      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution: '© OpenStreetMap' }).addTo(this._map);\n      this._renderer = L.canvas({ padding: 0.5 });\n    }\n    if (this._layer) { this._map.removeLayer(this._layer); this._layer = null; }\n    const grp = L.layerGroup();\n    const C = pc.city; const pts = [[C.la, C.lo]];\n    // feeders\n    pc.feeders.forEach(s => {\n      pts.push([s.lat, s.lon]);\n      const m = L.circleMarker([s.lat, s.lon], { renderer: this._renderer, radius: 3, color: '#1c4f96', weight: 0, fillColor: '#1c4f96', fillOpacity: 0.5 });\n      m.bindTooltip(s.name + ' · ' + s.routes.length + ' קווים', { direction: 'top' });\n      grp.addLayer(m);\n    });\n    // trunk lines + candidate markers\n    const maxScore = pc.candidates.length ? pc.candidates[0].score : 1;\n    pc.candidates.forEach(c => {\n      pts.push([c.lat, c.lon]);\n      L.polyline([[c.lat, c.lon], [C.la, C.lo]], { color: '#bd7b2c', weight: 2, dashArray: '4 6', opacity: 0.7 }).addTo(grp);\n      const r = 7 + Math.sqrt(c.score) * 1.5;\n      const m = L.circleMarker([c.lat, c.lon], { renderer: this._renderer, radius: r, color: '#ffffff', weight: 2.5, fillColor: '#bd7b2c', fillOpacity: 0.95 });\n      m.bindTooltip(c.name + ' · ' + c.routes + ' קווים · ' + c.nTowns + ' יישובים', { direction: 'top' });\n      grp.addLayer(m);\n      L.marker([c.lat, c.lon], { opacity: 0, interactive: false }).addTo(grp)\n        .bindTooltip(String(c.rank), { permanent: true, direction: 'center', className: 'gtfs-hublabel', offset: [0, 0] });\n    });\n    // city marker\n    L.circleMarker([C.la, C.lo], { renderer: this._renderer, radius: 11, color: '#ffffff', weight: 3, fillColor: '#14233b', fillOpacity: 1 }).addTo(grp);\n    L.marker([C.la, C.lo], { opacity: 0, interactive: false }).addTo(grp)\n      .bindTooltip(C.n, { permanent: true, direction: 'top', className: 'gtfs-citylabel', offset: [0, -8] });\n    grp.addTo(this._map); this._layer = grp;\n    if (!this._fitted || this._mapCity !== C.n) {\n      if (pts.length > 1) this._map.fitBounds(pts, { padding: [34, 34] }); else this._map.setView([C.la, C.lo], 11);\n      this._fitted = true; this._mapCity = C.n;\n    }\n    setTimeout(() => { if (this._map) this._map.invalidateSize(); }, 60);\n  }\n\n  // ---------- derive view ----------\n  renderVals() {\n    const st = this.state;\n    const base = {\n      isIdle: st.phase === 'idle', isParsing: st.phase === 'parsing', isError: st.phase === 'error', isDone: st.phase === 'done',\n      stage: st.stage || '', progressPct: st.progressPct || 0, rowsText: st.rowsText || '', errorMsg: st.errorMsg || '',\n      onFile: this.onFile, onDrop: this.onDrop, onDragOver: this.onDragOver, onReset: this.onReset, mapRef: this.mapRef,\n      nCities: '0', nIntercity: '0', nCandidates: '0', nOriginTowns: '0',\n      cityTabs: [], candidates: [], hasCandidates: false, noCandidates: false,\n      selectedCityName: st.selectedCity,\n      modeLabel: (this.props.busesOnly ?? true) ? 'אוטובוס בלבד' : 'כל סוגי התחבורה',\n    };\n    if (st.phase !== 'done' || !this._raw) return base;\n    const data = this._analyze();\n    const pc = this._selectedCityData(data);\n    const selName = pc ? pc.city.n : st.selectedCity;\n    const tabBase = 'font-family:inherit; font-size:15.5px; font-weight:600; padding:10px 22px; border-radius:8px; cursor:pointer; border:1px solid ';\n    const cityTabs = data.perCity.map(p => {\n      const active = p.city.n === selName;\n      const style = tabBase + (active ? '#14233b; background:#14233b; color:#fff;' : '#d6cfbf; background:#fff; color:#5b6470;')\n        + (p.nIntercity === 0 ? ' opacity:0.5;' : '');\n      return { label: p.city.n + ' · ' + p.candidates.length, style, onClick: () => this._selectCity(p.city.n) };\n    });\n    const totalCandidates = data.perCity.reduce((a, p) => a + p.candidates.length, 0);\n    const citiesWith = data.perCity.filter(p => p.nIntercity > 0).length;\n    const cands = pc ? pc.candidates : [];\n    return Object.assign(base, {\n      nCities: String(citiesWith || data.perCity.length),\n      nIntercity: data.nIntercityTotal.toLocaleString('he-IL'),\n      nCandidates: String(totalCandidates),\n      nOriginTowns: String(data.nOriginTowns),\n      cityTabs, candidates: cands, selectedCityName: selName,\n      hasCandidates: cands.length > 0, noCandidates: cands.length === 0,\n    });\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
